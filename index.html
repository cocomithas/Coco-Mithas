<!DOCTYPE html>
<html>
<head>
<title>Coco Mithaas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f0;
}

/* Header */
.header{
  background:#0b3d2e;
  color:white;
  text-align:center;
  padding:15px;
  font-size:28px;
  font-weight:bold;
}

/* Offer */
.offer{
  background:#ffc107;
  text-align:center;
  padding:10px;
  font-weight:bold;
}

/* Products */
.products{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  width:280px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.price{
  font-weight:bold;
}

button{
  background:#0b3d2e;
  color:white;
  padding:10px;
  border:none;
  margin:10px;
  width:90%;
  border-radius:6px;
}

/* Form */
.form{
  text-align:center;
  padding:20px;
}

input, textarea{
  width:250px;
  padding:10px;
  margin:5px;
}
</style>

</head>

<body>

<div class="header">COCO MITHAAS</div>

<div class="offer">
🎉 10% OFF with Code COCO10 | Free Shipping above ₹499
</div>

<div class="products">

<!-- Ladoo -->
<div class="card">
<img src="ladoo1.jpeg">
<h3>Coco Ladoo</h3>
<p class="price">₹149 / 250g</p>
<button onclick="order('Coco Ladoo',149)">💳 Pay & Order</button>
</div>

<!-- Family -->
<div class="card">
<img src="ladoo2.jpeg">
<h3>Family Pack</h3>
<p class="price">₹449</p>
<p style="color:red;">Buy 3 Get 1 Free 🎉</p>
<button onclick="order('Family Pack',449)">💳 Pay & Order</button>
</div>

</div>

<div class="form">
<h2>Customer Details</h2>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea>
</div>

<script>
function order(item, price){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill details first");return;
}

// UPI
window.location.href=`upi://pay?pa=8303560658@paytm&pn=CocoMithaas&am=${price}`;

// WhatsApp
setTimeout(()=>{
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(
`Order\n${item}\n₹${price}\n${name}\n${phone}\n${address}`)}`);
},3000);
}
</script>

</body>
</html>
