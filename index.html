<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CocoMithaas</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#f5f5f0;color:#0b3d2e;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#fff;}
nav a{margin:0 10px;text-decoration:none;color:#0b3d2e;}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:40px;}
.card{background:#fff;border-radius:10px;padding:20px;width:280px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
button{background:#0b3d2e;color:#fff;padding:10px;border:none;border-radius:5px;margin-top:5px;width:100%;cursor:pointer;}
</style>
</head>
<body>

<h1 style="text-align:center;">COCO MITHAAS</h1>

<div class="products">

<div class="card">
<img src="coco.jpeg">
<h3>Coco Ladoo</h3>
<p><b>₹149 / 250g</b></p>
<button onclick="payNow('Coco Ladoo',149)">💳 Pay & Order</button>
</div>

<div class="card">
<img src="coco.jpeg">
<h3>Family Pack</h3>
<p><b>₹449</b></p>
<p>Buy 3 Get 1 Free 🎉</p>
<button onclick="payNow('Family Pack',449)">💳 Pay & Order</button>
</div>

</div>

<div style="text-align:center;">
<h2>Customer Details</h2>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>
<button onclick="saveCustomer()">Save Details</button>
</div>

<script>
let customer={};

function saveCustomer(){
customer.name=document.getElementById('name').value;
customer.phone=document.getElementById('phone').value;
customer.address=document.getElementById('address').value;
alert('Details Saved');
}

function payNow(item,amount){
// Open UPI Payment
window.location.href=`upi://pay?pa=yourupi@upi&pn=CocoMithaas&am=${amount}`;

// After payment send WhatsApp
setTimeout(()=>{
let msg=`Payment Done ✅\nProduct: ${item}\nAmount: ₹${amount}\nName: ${customer.name}\nPhone: ${customer.phone}\nAddress: ${customer.address}`;
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(msg)}`);
},3000);
}
</script>

</body>
</html>
