<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CocoMithaas</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f0;}
header{text-align:center;background:#0b3d2e;color:#fff;padding:10px;}
.products{display:flex;gap:20px;justify-content:center;padding:20px;flex-wrap:wrap;}
.card{background:#fff;padding:15px;border-radius:10px;width:260px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;cursor:pointer;}
button{background:#0b3d2e;color:#fff;padding:10px;border:none;border-radius:5px;width:100%;margin-top:5px;}
input,textarea{padding:8px;margin:5px;width:250px;}
.cart{position:fixed;top:10px;right:10px;background:#fff;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<header>
<h1>COCO MITHAAS</h1>
</header>

<!-- CART -->
<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="ladoo1.jpeg" onclick="zoomImage(this.src)">
<h3>Coco Ladoo</h3>
<p>₹149 / 250g</p>
<button onclick="addToCart('Coco Ladoo',149)">🛒 Add to Cart</button>
<button onclick="payNow('Coco Ladoo',149)">💳 Pay Now</button>
</div>

<div class="card">
<img src="ladoo2.jpeg" onclick="zoomImage(this.src)">
<h3>Family Pack</h3>
<p>₹449</p>
<button onclick="addToCart('Family Pack',449)">🛒 Add to Cart</button>
<button onclick="payNow('Family Pack',449)">💳 Pay Now</button>
</div>

</div>

<!-- CUSTOMER -->
<div style="text-align:center;">
<h2>Customer Details</h2>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>

<h3>Coupon</h3>
<input id="coupon" placeholder="COCO10">
<button onclick="applyCoupon()">Apply</button>
<p id="msg"></p>
</div>

<!-- ZOOM -->
<div id="zoomBox" onclick="this.style.display='none'" style="
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);justify-content:center;align-items:center;">
<img id="zoomImg" style="max-width:90%;max-height:90%;">
</div>

<script>
let cart=[];
let discount=0;
let used=false;

// CART
function addToCart(item,price){
cart.push({item,price});
document.getElementById("cartCount").innerText=cart.length;
alert("Added to cart");
}

// COUPON
function applyCoupon(){
if(used){ msg.innerText="❌ Used"; return; }
if(coupon.value=="COCO10"){
discount=0.10;
used=true;
msg.innerText="✅ Applied";
}else{
msg.innerText="❌ Invalid";
}
}

// PAYMENT
function payNow(item,amount){
if(!name.value || !phone.value || !address.value){
alert("Fill details"); return;
}

let final=amount-(amount*discount);

window.location.href=`upi://pay?pa=yourupi@upi&pn=CocoMithaas&am=${final}`;

setTimeout(()=>{
let text=`Order\\n${item}\\n₹${final}\\n${name.value}\\n${phone.value}\\n${address.value}`;
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(text)}`);
},3000);
}

// ZOOM
function zoomImage(src){
document.getElementById("zoomBox").style.display="flex";
document.getElementById("zoomImg").src=src;
}
</script>

</body>
</html>
