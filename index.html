<head>

<style>
body {font-family:Arial;margin:0;background:#f5fff5;}

</style>
</head>

<body>

<header>
<img src="coco.jpeg" class="logo">
<h1>Coco Mithas</h1>
<p>Fresh Coconut Sweets</p>
</header>

<!-- SLIDER -->
<div class="slider">
<img id="slide" src="coco.jpeg">
</div>

<div class="container">

<!-- PRODUCT 1 -->
<div class="product">
<div class="badge">BEST VALUE</div>
<img src="coco.jpeg">
<h2>Premium Sweet Box</h2>
<p>₹299 <del>₹399</del></p>
<input type="number" id="qty1" value="1" min="1">
<button class="add" onclick="addToCart(299,'Premium Sweet Box',qty1.value)">Add to Cart</button>
</div>

<!-- PRODUCT 2 -->
<div class="product">
<div class="badge" style="background:lightgreen;">SIGNATURE</div>
<img src="cocomithas.jpeg">
<h2>Special Laddu</h2>
<p>₹70 / 250g</p>
<input type="number" id="qty2" value="1" min="1">
<button class="add" onclick="addToCart(70,'Special Laddu',qty2.value)">Add to Cart</button>
</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<div class="total" id="total">Total: ₹0</div>

<button class="pay" onclick="payUPI()">💳 Pay via UPI</button>
<button class="cod" onclick="codOrder()">📦 Cash on Delivery</button>
<button class="add" onclick="orderWhatsApp()">📲 WhatsApp Order</button>
</div>

<!-- FORM -->
<form onsubmit="orderWhatsApp();return false;">
<h3>📦 Delivery Details</h3>
<input type="text" id="name" placeholder="Name" required><br><br>
<input type="text" id="phone" placeholder="Phone" required><br><br>
<textarea id="address" placeholder="Address" required></textarea><br>
<button class="pay">Place Order</button>
</form>

<!-- SOCIAL -->
<div class="social" style="text-align:center;">

<img src="https://img.icons8.com/color/48/whatsapp.png">
</a>

<a href="https://www.instagram.com/coco_mithas">
<img src="https://img.icons8.com/color/48/instagram-new.png">
</a>
</div>

</div>

<script>

let cart = [];
let total = 0;

// ADD TO CART
function addToCart(price,name,qty){
qty=parseInt(qty);
let free=Math.floor(qty/3);
let totalQty=qty+free;

cart.push(name+" x "+qty+" + "+free+" FREE");

total+=price*qty;

document.getElementById("cartItems").innerHTML=cart.join("<br>");
document.getElementById("total").innerHTML="Total: ₹"+total;
}

// UPI PAYMENT
function payUPI(){
if(total==0){alert("Add items first");return;}

window.location.href="upi://pay?pa=8303560658@upi&pn=Coco Mithas&am="+total+"&cu=INR";
}

// COD
function codOrder(){
alert("Order placed with Cash on Delivery ✅");
orderWhatsApp();
}

// WHATSAPP
function orderWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg="Order:%0A"+cart.join("%0A")+
"%0A%0ATotal: ₹"+total+
"%0A%0AName: "+name+
"%0APhone: "+phone+
"%0AAddress: "+address;

window.open("https://wa.me/918303560658?text="+msg);
}

// SLIDER
let images=["coco.jpeg","cocomithas.jpeg"];
let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},2000);

</script>
