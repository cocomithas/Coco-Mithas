<!-- CART UI -->
<style>
#cartBox {
  position: fixed;
  top: 80px;
  right: 20px;
  width: 320px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 15px;
  z-index: 9999;
  display: none;
}
#cartBox input, #cartBox textarea {
  width: 100%;
  padding: 6px;
  margin-bottom: 5px;
  border: 1px solid #ccc;
}
</style>

<div id="cartBox">
  <h3><b>Your Cart</b></h3>

  <!-- Customer Form -->
  <input id="custName" placeholder="Your Name">
  <input id="custPhone" placeholder="Phone Number">
  <textarea id="custAddress" placeholder="Address"></textarea>

  <!-- Cart Items -->
  <ul id="cartItems"></ul>
  <p><b>Total: ₹<span id="total">0</span></b></p>

  <button onclick="payNowFull()" style="width:100%;background:black;color:white;padding:10px;margin-top:5px;">
    Pay Now 💰
  </button>

  <button onclick="checkoutWhatsApp()" style="width:100%;background:green;color:white;padding:10px;margin-top:5px;">
    WhatsApp Order 📲
  </button>
</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let cart = [];

// 🛒 Add to cart
function addToCart(name, price) {
  cart.push({ name, price });
  updateCart();
  alert(name + " added 🛒");
}

// ❌ Remove item
function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

// 🔄 Update cart
function updateCart() {
  let list = document.getElementById("cartItems");
  let total = 0;
  list.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;
    list.innerHTML += `
      <li>
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${index})" style="color:red;">❌</button>
      </li>`;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cartCount").innerText = cart.length;
}

// 🛒 Toggle cart
function toggleCart() {
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 📊 Save to Google Sheet
function sendOrderToSheet(payment_id="COD") {
  let name = document.getElementById("custName").value;
  let phone = document.getElementById("custPhone").value;
  let address = document.getElementById("custAddress").value;

  let order = "";
  let total = 0;

  cart.forEach((item) => {
    order += item.name + " ₹" + item.price + ", ";
    total += item.price;
  });

  fetch("YOUR_GOOGLE_SCRIPT_URL", {
    method: "POST",
    body: JSON.stringify({
      name,
      phone,
      address,
      order,
      total,
      payment_id
    })
  });
}

// 💰 Payment
function payNowFull() {
  if(cart.length === 0){
    alert("Cart empty hai!");
    return;
  }

  let total = 0;
  cart.forEach(item => total += item.price);

  var options = {
    "key": "YOUR_KEY_ID",
    "amount": total * 100,
    "currency": "INR",
    "name": "COCO MITHAAS",
    "description": "Order Payment",
    "handler": function (response){
      alert("Payment Successful ✅");
      sendOrderToSheet(response.razorpay_payment_id);
      checkoutWhatsApp();
    }
  };

  var rzp1 = new Razorpay(options);
  rzp1.open();
}

// 📲 WhatsApp Order
function checkoutWhatsApp() {
  sendOrderToSheet();

  let message = "🛒 COCO MITHAAS Order%0A%0A";
  let total = 0;

  cart.forEach((item, i) => {
    message += ${i+1}. ${item.name} - ₹${item.price}%0A;
    total += item.price;
  });

  message += %0ATotal: ₹${total};

  window.open(https://wa.me/918303560658?text=${message});
}
</script>
