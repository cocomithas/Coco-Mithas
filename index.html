<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Mithas</title>

<style>
body{margin:0;font-family:Arial;background:#f5fff7;}
header{background:#0f5132;color:white;text-align:center;padding:15px;font-size:22px;}
.container{padding:15px;}
.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}
img{width:100%;border-radius:10px;}
.price{color:#198754;font-size:22px;font-weight:bold;}
.btn{
display:block;
width:90%;
margin:8px auto;
padding:12px;
border:none;
border-radius:10px;
color:white;
background:#198754;
}
.btn:hover{background:#146c43;}
input,textarea{
width:90%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}
.social button{margin:5px;}
</style>
</head>

<body>

<header>
🥥 Coco Mithas  
<p>📸 @coco_mithas | 📱 8303560658</p>
</header>

<div class="container">

<!-- PRODUCT -->
<div class="card">
<img src="coco-laddoo.jpg">
<h3>Coconut Laddoo (250g)</h3>
<p class="price">₹149</p>

<input id="qty" type="number" placeholder="Quantity">

<button class="btn" onclick="buy()">Buy Now</button>
</div>

<!-- COMBO -->
<div class="card">
<h3>🔥 Combo (3 Pack)</h3>
<p class="price">₹449</p>

<button class="btn" onclick="combo()">Buy Combo</button>
</div>

<!-- FORM -->
<div class="card">
<h3>📦 Delivery Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>
</div>

<!-- TRACK -->
<div class="card">
<h3>🚚 Track Order</h3>
<input id="trackId" placeholder="Enter Order ID">
<button class="btn" onclick="track()">Track</button>
<p id="status"></p>
</div>

<!-- REVIEW -->
<div class="card">
<h3>⭐ Reviews</h3>
<p>“Bahut tasty laddoo 😍”</p>
<p>“Best quality 🔥”</p>

<input placeholder="Write review">
<button class="btn">Submit</button>
</div>

<!-- SOCIAL -->
<div class="card social">
<h3>📲 Connect</h3>

<a href="https://wa.me/918303560658">
<button class="btn" style="background:#25D366;">WhatsApp</button>
</a>

<a href="https://www.instagram.com/coco_mithas" target="_blank">
<button class="btn" style="background:#e1306c;">Instagram</button>
</a>

</div>

</div>

<script>

function id(){
return "CM"+Math.floor(Math.random()*10000);
}

function buy(){
let q=document.getElementById("qty").value;
if(!q){alert("Enter qty");return;}

let total=(149*q)+40;
let order=id();

alert("Order ID:"+order+" Total ₹"+total);

window.location.href="upi://pay?pa=8303560658@ptsbi&pn=CocoMithas&am="+total+"&cu=INR";

window.open("https://wa.me/918303560658?text=Order ID:"+order+" Qty:"+q+" Total:"+total);
}

function combo(){
let total=449+40;
let order=id();

alert("Order ID:"+order+" Total ₹"+total);

window.location.href="upi://pay?pa=8303560658@ptsbi&pn=CocoMithas&am="+total+"&cu=INR";

window.open("https://wa.me/918303560658?text=Combo Order ID:"+order+" Total:"+total);
}

function track(){
let id=document.getElementById("trackId").value;
if(id){
document.getElementById("status").innerHTML="📦 "+id+" is Out for Delivery 🚚";
}
}

</script>

</body>
</html>
