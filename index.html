<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CocoMithaas</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f0;}
header{text-align:center;background:#0b3d2e;color:#fff;padding:10px;}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:10px;padding:15px;width:260px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;cursor:pointer;}
button{background:#0b3d2e;color:#fff;padding:10px;border:none;border-radius:5px;width:100%;margin-top:5px;}
input,textarea{padding:8px;margin:5px;width:250px;}
.offer-bar{background:#0b3d2e;color:#fff;overflow:hidden;}
.offer-text{white-space:nowrap;display:inline-block;padding:10px;animation:scroll 10s linear infinite;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

/* zoom */
#zoomBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
#zoomBox img{max-width:90%;max-height:90%;}
</style>

</head>
<body>

<header>
<h1>COCO MITHAAS</h1>
</header>

<!-- OFFER -->
<div class="offer-bar">
<div class="offer-text">🎉 10% OFF | COCO10 | FREE SHIPPING</div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img id="slider1" src="ladoo1.jpeg" onclick="zoomImage(this.src)">
<h3>Coco Ladoo</h3>
<p><b>₹149 / 250g</b></p>
<button onclick="payNow('Coco Ladoo',149)">💳 Pay & Order</button>
</div>

<div class="card">
<img id="slider2" src="ladoo2.jpeg" onclick="zoomImage(this.src)">
<h3>Family Pack</h3>
<p><b>₹449</b></p>
<button onclick="payNow('Family Pack',449)">💳 Pay & Order</button>
</div>

</div>

<!-- CUSTOMER -->
<div style="text-align:center;">
<h2>Customer Details</h2>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>

<h3>🎁 Coupon</h3>
<input id="coupon" placeholder="COCO10">
<button onclick="applyCoupon()">Apply</button>
<p id="msg"></p>
</div>

<!-- GALLERY -->
<h2 style="text-align:center;">Gallery</h2>
<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
<img src="ladoo1.jpeg" onclick="zoomImage(this.src)" width="120">
<img src="ladoo2.jpeg" onclick="zoomImage(this.src)" width="120">
</div>

<!-- ZOOM -->
<div id="zoomBox" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>
let discount=0;
let used=false;

// coupon
function applyCoupon(){
if(used){ msg.innerText="❌ Already used"; return; }

if(coupon.value=="COCO10"){
discount=0.10;
used=true;
msg.innerText="✅ Applied";
}else{
msg.innerText="❌ Invalid";
}
}

// payment
function payNow(item,amount){
if(!name.value || !phone.value || !address.value){
alert("Fill details first"); return;
}

let final=amount-(amount*discount);

window.location.href=`upi://pay?pa=yourupi@upi&pn=CocoMithaas&am=${final}`;

setTimeout(()=>{
let txt=`Order\\n${item}\\n₹${final}\\n${name.value}\\n${phone.value}\\n${address.value}`;
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(txt)}`);
},3000);
}

// zoom
function zoomImage(src){
zoomBox.style.display="flex";
zoomImg.src=src;
}
function closeZoom(){
zoomBox.style.display="none";
}

// slider
let imgs1=["ladoo1.jpeg","ladoo2.jpeg"];
let i=0;
setInterval(()=>{
i=(i+1)%imgs1.length;
slider1.src=imgs1[i];
},2000);

let imgs2=["ladoo2.jpeg","ladoo1.jpeg"];
let j=0;
setInterval(()=>{
j=(j+1)%imgs2.length;
slider2.src=imgs2[j];
},2000);

</script>

</body>
</html>
