<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CocoMithaas</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#f5f5f0;color:#0b3d2e;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#fff;}
header h1{margin:0;}
nav a{margin:0 10px;text-decoration:none;color:#0b3d2e;}
.hero{text-align:center;padding:40px 20px;}
.hero img{width:120px;border-radius:50%;}
.hero h2{font-size:50px;margin:10px 0;}
.banner{background:#0b3d2e;color:#fff;padding:10px;text-align:center;}
.section{padding:40px;}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{background:#fff;border-radius:10px;padding:20px;width:280px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.card img{width:100%;border-radius:10px;height:180px;object-fit:cover;}
button{background:#0b3d2e;color:#fff;padding:10px;border:none;border-radius:5px;cursor:pointer;margin-top:5px;width:100%;}
form{text-align:center;margin:30px;}
input,textarea{width:250px;padding:8px;margin:5px;}
footer{text-align:center;padding:20px;background:#222;color:#fff;}
</style>
</head>
<body>

<header>
<h1>COCO MITHAAS</h1>
<nav>
<a href="#">Collections</a>
<a href="#">Our Story</a>
<a href="#">Gifting</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="hero">
<img src="coco.jpeg" alt="logo">
<h2>COCO MITHAAS</h2>
<p>The Botanical Confectioner</p>
</div>

<div class="banner">
10% OFF | Code: COCO10 | Free Shipping over ₹999
</div>

<div class="section">
<h2>Handcrafted Perfection</h2>
<div class="products">

<div class="card">
<img src="coco.jpeg">
<h3>Coco Ladoo</h3>
<p>₹149</p>
<button onclick="addToCart('Coco Ladoo',149)">Add to Cart</button>
<button onclick="orderWhatsApp('Coco Ladoo')">Order</button>
</div>

<div class="card">
<img src="coco.jpeg">
<h3>Family Pack</h3>
<p>₹449 (Buy 3 Get 1 Free)</p>
<button onclick="addToCart('Family Pack',449)">Add to Cart</button>
<button onclick="orderWhatsApp('Family Pack')">Order</button>
</div>

</div>
</div>

<form>
<h2>Customer Details</h2>
<input id="name" placeholder="Name"><br>
<textarea id="address" placeholder="Address"></textarea><br>
<button type="button" onclick="saveCustomer()">Save</button>
</form>

<div style="text-align:center;">
<button onclick="payUPI()">💰 Pay via UPI</button>
<button onclick="downloadBill()">⬇️ Download Bill</button>
</div>

<footer>
<p>© CocoMithaas</p>
</footer>

<script>
let cart=[];
let customer={name:'',address:''};

function addToCart(item,price){
cart.push({item,price});
alert(item+" added");
}

function saveCustomer(){
customer.name=document.getElementById('name').value;
customer.address=document.getElementById('address').value;
alert('Saved');
}

function orderWhatsApp(item){
let msg=`Order: ${item}\nName: ${customer.name}\nAddress: ${customer.address}`;
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(msg)}`);
}

function payUPI(){
window.location.href="upi://pay?pa=yourupi@upi&pn=CocoMithaas&am=100";
}

function downloadBill(){
let text="CocoMithaas Bill\n";
text+=`Name: ${customer.name}\nAddress: ${customer.address}\n`;
let total=0;
cart.forEach((c,i)=>{text+=`${i+1}. ${c.item} ₹${c.price}\n`; total+=c.price;});
text+=`Total ₹${total}`;
let blob=new Blob([text]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='bill.txt';
a.click();
}
</script>

</body>
</html>
