<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Mithas Pro</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

header {
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
}

.logo {
  width:80px;
  border-radius:50%;
}

.slider img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.container { padding:20px; }

.product, .cart, form {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.product img {
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.offer {
  background:#ffeb3b;
  padding:5px;
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add { background:#2e7d32; color:white; }
.pay { background:#25D366; color:white; }

.total { font-weight:bold; font-size:18px; color:green; }

.social img{
  width:40px;
  margin:10px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo"><br>
  <h1>Coco Mithas</h1>
  <p>Fresh Coconut Sweets</p>
</header>

<!-- SLIDER -->
<div class="slider">
  <img id="slide" src="ladoo.png">
</div>

<div class="container">

<!-- PRODUCT 1 -->
<div class="product">
  <img src="ladoo.png">
  <h2>🥥 Coconut Laddoo</h2>
  <p>₹149 / 250g</p>

  <input type="number" id="qty1" value="1" min="1">

  <button class="add" onclick="addSingle()">Add to Cart</button>
</div>

<!-- PRODUCT 2 OFFER -->
<div class="product">
  <div class="offer">🔥 Buy 3 Get 1 FREE 🔥</div>

  <img src="ladoo2.png">
  <h2>🥥 Offer Pack</h2>
  <p>3 Box = ₹447 (1 FREE)</p>

  <input type="number" id="qty2" value="1" min="1">

  <button class="add" onclick="addOffer()">Add Offer Pack</button>
</div>

<!-- CART -->
<div class="cart">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <div class="total" id="total">Total: ₹0</div>

  <button class="pay" onclick="payUPI()">💳 Pay via UPI</button>
  <button class="add" onclick="orderWhatsApp()">📲 Order on WhatsApp</button>
</div>

<!-- FORM -->
<form onsubmit="orderWhatsApp(); return false;">
  <h3>📦 Delivery Details</h3>
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="phone" placeholder="Phone" required>
  <textarea id="address" placeholder="Address" required></textarea>
  <button class="pay">Place Order</button>
</form>

<!-- SOCIAL -->
<div class="social" style="text-align:center;">
  <a href="https://wa.me/918303560658">
    <img src="https://img.icons8.com/color/48/whatsapp.png">
  </a>

  <a href="https://www.instagram.com/coco_mithas">
    <img src="https://img.icons8.com/color/48/instagram-new.png">
  </a>
</div>

</div>

<script>
let totalAmount = 0;
let cartText = "";

// SINGLE PRODUCT
function addSingle() {
  let qty = parseInt(document.getElementById("qty1").value);
  let price = 149;
  let free = Math.floor(qty / 3);

  let totalQty = qty + free;
  let total = qty * price;

  totalAmount += total;
  cartText += "Single: " + qty + " + " + free + " FREE\n";

  updateCart();
}

// OFFER PACK
function addOffer() {
  let qty = parseInt(document.getElementById("qty2").value);
  let price = 447;

  totalAmount += qty * price;
  cartText += "Offer Pack x " + qty + "\n";

  updateCart();
}

// UPDATE CART
function updateCart() {
  document.getElementById("cartItems").innerText = cartText;
  document.getElementById("total").innerHTML = "Total: ₹" + totalAmount;
}

// UPI
function payUPI() {
  if(totalAmount == 0){
    alert("Add item first");
    return;
  }

  window.location.href =
    "upi://pay?pa=8303560658@ptsbi&pn=Coco%20Mithas&am=" + totalAmount + "&cu=INR";
}

// WHATSAPP
function orderWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let msg =
    "Order:%0A" +
    cartText + "%0A" +
    "Total: ₹" + totalAmount + "%0A%0A" +
    "Name: " + name + "%0APhone: " + phone + "%0AAddress: " + address;

  window.open("https://wa.me/918303560658?text=" + msg);
}

// SLIDER
let images = ["ladoo.png","ladoo2.png","ladoo3.png"];
let i = 0;

setInterval(()=>{
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
},2000);

</script>

</body>
</html>
