<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCO MITHAAS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-[#f8f7f3]">

<!-- NAVBAR -->
<div class="flex justify-between p-5 bg-white shadow">
  <h1 class="text-2xl font-bold text-green-900">COCO MITHAAS</h1>
  <button onclick="openCart()" class="text-green-900">🛒 Cart</button>
</div>

<!-- HERO -->
<div class="text-center mt-10">
  <h1 class="text-5xl font-bold text-green-900">COCO MITHAAS</h1>
  <p class="text-gray-500">The Botanical Confectioner</p>
</div>

<!-- PRODUCTS -->
<div class="grid md:grid-cols-2 gap-6 p-10">

  <!-- PRODUCT 1 -->
  <div class="bg-white p-6 rounded-xl shadow">
    <img src="ladoo.jpg" class="rounded-lg mb-4">
    <h2 class="text-xl text-green-900 font-semibold">Coco Ladoo</h2>
    <p class="text-gray-500">₹149</p>
    <button onclick="addToCart('Coco Ladoo',149)"
      class="mt-3 bg-green-900 text-white px-4 py-2 rounded-full">
      ADD TO BASKET
    </button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="bg-white p-6 rounded-xl shadow">
    <img src="box.jpg" class="rounded-lg mb-4">
    <h2 class="text-xl text-green-900 font-semibold">Family Pack</h2>
    <p class="text-gray-500">₹449</p>
    <button onclick="addToCart('Family Pack',449)"
      class="mt-3 bg-green-900 text-white px-4 py-2 rounded-full">
      ADD TO BASKET
    </button>
  </div>

</div>

<!-- CART MODAL -->
<div id="cartModal" class="hidden fixed top-0 left-0 w-full h-full bg-black/50 flex justify-center items-center">

  <div class="bg-white p-6 rounded-xl w-[90%] md:w-[400px]">
    <h2 class="text-xl font-bold mb-4">Your Cart</h2>

    <div id="cartItems"></div>

    <p class="mt-4 font-semibold">Total: ₹<span id="total"></span></p>

    <!-- FORM -->
    <input id="name" placeholder="Name" class="w-full border p-2 mt-3">
    <input id="phone" placeholder="Phone" class="w-full border p-2 mt-2">
    <input id="address" placeholder="Address" class="w-full border p-2 mt-2">

    <div class="flex gap-2 mt-4">
      <button onclick="payNow()" class="bg-green-900 text-white px-4 py-2 rounded w-full">
        Pay Now
      </button>

      <button onclick="codOrder()" class="bg-yellow-500 text-black px-4 py-2 rounded w-full">
        COD
      </button>
    </div>

    <button onclick="closeCart()" class="mt-3 text-red-500">Close</button>
  </div>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/918303560658" target="_blank"
style="position:fixed;bottom:20px;left:20px;background:#25D366;color:white;padding:12px;border-radius:50%;">
💬</a>

<!-- INSTAGRAM -->
<a href="https://instagram.com/YOUR_USERNAME" target="_blank"
style="position:fixed;bottom:80px;left:20px;background:#E1306C;color:white;padding:12px;border-radius:50%;">
📸</a>

<script>

let cart = [];

function addToCart(name, price){
  cart.push({name, price});
  alert("Added to cart 🛒");
}

function openCart(){
  document.getElementById("cartModal").classList.remove("hidden");
  renderCart();
}

function closeCart(){
  document.getElementById("cartModal").classList.add("hidden");
}

function renderCart(){
  let items = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;
    items += `<p>${item.name} - ₹${item.price} 
      <button onclick="removeItem(${index})">❌</button></p>`;
  });

  document.getElementById("cartItems").innerHTML = items;
  document.getElementById("total").innerText = total;
}

function removeItem(index){
  cart.splice(index,1);
  renderCart();
}

function payNow(){
  let total = document.getElementById("total").innerText;

  var options = {
    "key": "rzp_test_YOUR_KEY_HERE",
    "amount": total * 100,
    "currency": "INR",
    "name": "COCO MITHAAS",
    "handler": function (){
      alert("Payment Success ✅");
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

function codOrder(){
  let total = document.getElementById("total").innerText;
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let msg = `New Order 🧁
Name: ${name}
Phone: ${phone}
Address: ${address}
Total: ₹${total}`;

  window.open("https://wa.me/918303560658?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
