<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Mithaas</title>

<style>
body{
  margin:0;
  font-family: 'Georgia', serif;
  background:#f5f5f0;
}

/* HEADER */
header{
  background:#0b3d2e;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:28px;
  letter-spacing:2px;
}

/* OFFER BAR */
.offer{
  background:#ffd700;
  text-align:center;
  padding:10px;
  font-weight:bold;
}

/* PRODUCTS */
.products{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:40px;
  flex-wrap:wrap;
}

.card{
  background:#fff;
  border-radius:15px;
  width:280px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  cursor:pointer;
}

.card-content{
  padding:15px;
  text-align:center;
}

.price{
  font-size:18px;
  margin:10px 0;
}

.offer-text{
  color:red;
  font-weight:bold;
}

button{
  background:#0b3d2e;
  color:#fff;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  margin-top:8px;
  cursor:pointer;
}

/* CUSTOMER */
.customer{
  text-align:center;
  padding:30px;
}

input,textarea{
  width:250px;
  padding:10px;
  margin:5px;
}

/* GALLERY */
.gallery{
  text-align:center;
}

.gallery img{
  width:180px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

/* ZOOM */
#zoomBox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
#zoomBox img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<header>COCO MITHAAS</header>

<div class="offer">
🎉 10% OFF with Code COCO10 | Free Shipping over ₹499
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="ladoo1.jpeg" onclick="zoomImage(this.src)">
<div class="card-content">
<h3>Coco Ladoo</h3>
<p class="price">₹149 / 250g</p>
<button onclick="addToCart()">🛒 Add to Cart</button>
<button onclick="payNow('Coco Ladoo',149)">💳 Pay & Order</button>
</div>
</div>

<div class="card">
<img src="ladoo2.jpeg" onclick="zoomImage(this.src)">
<div class="card-content">
<h3>Family Pack</h3>
<p class="price">₹449</p>
<p class="offer-text">Buy 3 Get 1 Free 🎉</p>
<button onclick="addToCart()">🛒 Add to Cart</button>
<button onclick="payNow('Family Pack',449)">💳 Pay & Order</button>
</div>
</div>

</div>

<!-- CUSTOMER -->
<div class="customer">
<h2>Customer Details</h2>
<input id="name" placeholder="Your Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>

<input id="coupon" placeholder="COCO10">
<button onclick="applyCoupon()">Apply</button>
<p id="msg"></p>
</div>

<!-- GALLERY -->
<div class="gallery">
<h2>Our Gallery</h2>
<img src="ladoo1.jpeg" onclick="zoomImage(this.src)">
<img src="ladoo2.jpeg" onclick="zoomImage(this.src)">
</div>

<!-- ZOOM -->
<div id="zoomBox" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>
let discount=0;
let used=false;

// coupon
function applyCoupon(){
if(used){ msg.innerText="❌ Used"; return; }
if(coupon.value=="COCO10"){
discount=0.10;
used=true;
msg.innerText="✅ Applied";
}else{
msg.innerText="❌ Invalid";
}
}

// payment
function payNow(item,amount){
if(!name.value || !phone.value || !address.value){
alert("Fill details"); return;
}

let final=amount-(amount*discount);

window.location.href=`upi://pay?pa=yourupi@upi&pn=CocoMithaas&am=${final}`;

setTimeout(()=>{
let text=`Order\n${item}\n₹${final}\n${name.value}\n${phone.value}\n${address.value}`;
window.open(`https://wa.me/918303560658?text=${encodeURIComponent(text)}`);
},3000);
}

// zoom
function zoomImage(src){
zoomBox.style.display="flex";
zoomImg.src=src;
}
</script>

</body>
</html>
